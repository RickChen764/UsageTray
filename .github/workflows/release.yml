name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Verify tag matches project version
        shell: pwsh
        run: |
          [xml]$project = Get-Content .\UsageTray\UsageTray.csproj
          $version = $project.Project.PropertyGroup.Version
          $acceptedTags = @("v$version", "v$version.0")
          if ("${{ github.ref_name }}" -notin $acceptedTags) {
            throw "Tag ${{ github.ref_name }} does not match project version v$version"
          }

      - name: Test
        run: dotnet test .\UsageTray.Tests\UsageTray.Tests.csproj -c Release

      - name: Publish
        run: >-
          dotnet publish .\UsageTray\UsageTray.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None -p:DebugSymbols=false
          -o .\publish

      - name: Prepare release assets
        shell: pwsh
        run: |
          Move-Item .\publish\UsageTray.exe .\UsageTray-win-x64.exe
          $hash = (Get-FileHash .\UsageTray-win-x64.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  UsageTray-win-x64.exe" | Set-Content -Encoding ascii -NoNewline .\UsageTray-win-x64.exe.sha256

      - name: Prepare release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $customNotes = ".\release-notes\$tag.md"
          if (Test-Path $customNotes) {
            Copy-Item $customNotes .\release-notes.md
            exit 0
          }

          $previousTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($LASTEXITCODE -eq 0 -and $previousTag) {
            $subjects = @(git log "$previousTag..$tag" --pretty=format:"%s")
          } else {
            $subjects = @(git log -20 --pretty=format:"%s")
          }

          $notes = foreach ($subject in $subjects) {
            $clean = $subject -replace '^(feat|fix|perf|refactor|docs|ci|build|test|chore)(\([^)]*\))?!?:\s*', ''
            if (-not [string]::IsNullOrWhiteSpace($clean)) { "- $clean" }
          }
          if (-not $notes) { $notes = @('- 常规稳定性和体验改进') }
          $notes | Set-Content -Encoding utf8 .\release-notes.md

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          .\UsageTray-win-x64.exe
          .\UsageTray-win-x64.exe.sha256
          --title "UsageTray ${{ github.ref_name }}"
          --notes-file .\release-notes.md
